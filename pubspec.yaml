name: accounting_desktop_flutter
description: Premium desktop accounting software starter built with Flutter, Riverpod and SQLite.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4
  file_selector: ^1.0.3
  pdf: ^3.11.1
  printing: ^5.13.4
  intl: ^0.19.0
  crypto: ^3.0.3
  uuid: ^4.5.1
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
